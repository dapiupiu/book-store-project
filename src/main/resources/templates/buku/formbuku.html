<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tambah Buku</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/normalize.css}">

    <style>
        :root {
            --sage-primary: #059669;
            --sage-light: #ecfdf5;
            --bg-soft: #f8fafc;
            --text-main: #1e293b;
        }

        body {
            background-color: var(--bg-soft);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
        }

        .sidebar {
            width: 260px;
            background: white;
            border-right: 1px solid rgba(0,0,0,0.05);
        }

        .nav-link {
            color: #64748b;
            font-weight: 500;
            padding: 12px 20px;
            border-radius: 12px;
            margin-bottom: 5px;
            transition: all 0.2s;
            text-decoration: none;
        }

        .nav-link:hover {
            background-color: var(--sage-light);
            color: var(--sage-primary);
        }

        .nav-link.active {
            background-color: var(--sage-primary) !important;
            color: white !important;
        }

        /* Form & Card Styling */
        .card {
            border: none;
            border-radius: 24px;
            background: white;
        }

        .form-label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #64748b;
            margin-bottom: 8px;
        }

        .form-control {
            border-radius: 12px;
            padding: 12px;
            border: 1px solid #e2e8f0;
            background-color: #fcfdfd;
        }

        .form-control:focus {
            border-color: var(--sage-primary);
            box-shadow: 0 0 0 4px rgba(5, 150, 105, 0.05);
        }

        .btn-sage {
            background-color: var(--sage-primary);
            color: white;
            border-radius: 12px;
            padding: 12px 25px;
            font-weight: 600;
            border: none;
            transition: 0.3s;
        }

        .btn-sage:hover {
            background-color: #047857;
            box-shadow: 0 8px 15px rgba(5, 150, 105, 0.2);
            color: white;
        }

        .btn-cancel {
            background-color: #f1f5f9;
            color: #64748b;
            border-radius: 12px;
            padding: 12px 25px;
            font-weight: 600;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn-cancel:hover {
            background-color: #e2e8f0;
            color: #1e293b;
        }
    </style>
</head>
<body>

<div class="d-flex" style="min-height:100vh;">

    <aside class="sidebar p-4 d-flex flex-column shadow-sm">
        <div class="text-center mb-4 pt-4">
            <img th:src="@{/images/main-logo.png}" alt="Logo" style="max-height: 40px;" class="mb-2">
            <h6 class="fw-bold mb-0" style="color: var(--sage-primary);">Manajemen Buku</h6>
            <small class="text-muted">Admin</small>
        </div>

        <ul class="nav flex-column mt-3">
            <li class="nav-item">
                <a class="nav-link" th:href="@{/dashboard}">🏠 Dashboard</a>
            </li>
            <li class="nav-item">
                <a class="nav-link active" th:href="@{/buku/view}">📚 Data Buku</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/kategori/view}">🗂 Kategori</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/stok/view}">📦 Stok Buku</a>
            </li>
			<li class="nav-item">
			  <a class="nav-link" th:href="@{/penjualan}">🧾 Transaksi</a>
			</li>
			<li class="nav-item">
			  <a class="nav-link" th:href="@{/laporan}">📊 Laporan</a>
			</li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/user/view}">👤 Pengguna</a>
            </li>
        </ul>

        <div class="mt-auto pt-4 border-top">
            <a class="nav-link text-danger w-100" th:href="@{/logout}">🚪 Logout</a>
        </div>
    </aside>

    <main class="flex-fill p-4 p-md-5">

        <div class="mb-4">
            <h3 class="fw-bold">Tambah Data Buku</h3>
            <p class="text-muted">Masukkan detail buku baru untuk ditambahkan ke sistem.</p>
        </div>

        <div class="card shadow-sm p-4">
            <div class="card-body">

                <form th:action="@{/buku/simpan}" th:object="${buku}" method="post">
                    
                    <div class="row g-4">

                        <div class="col-md-6">
                            <label class="form-label">Judul Buku</label>
                            <input type="text" class="form-control" th:field="*{judul}" placeholder="Masukkan judul buku">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Penulis</label>
                            <input type="text" class="form-control" th:field="*{penulis}" placeholder="Nama penulis">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Penerbit</label>
                            <input type="text" class="form-control" th:field="*{penerbit}" placeholder="Nama penerbit">
                        </div>

                        <div class="col-md-3">
                            <label class="form-label">Tahun Terbit</label>
                            <input type="number" class="form-control" th:field="*{tahun}" placeholder="YYYY">
                        </div>

                        <div class="col-md-3">
                            <label class="form-label">Harga (Rp)</label>
                            <input type="number" class="form-control" th:field="*{harga}" placeholder="0">
                        </div>

						<div class="col-md-6">
						    <label class="form-label">Kategori</label>
						    <select th:field="*{kategori}" class="form-select" required>
						        <option value="">-- Pilih Kategori --</option>
						        <option th:each="k : ${listkategori}" 
						                th:value="${k.namakategori}" 
						                th:text="${k.namakategori}">
						        </option>
						    </select>
						</div>

                        <div class="col-md-6">
                            <label class="form-label">ISBN</label>
                            <input type="text" class="form-control" th:field="*{isbn}" placeholder="Nomor ISBN">
                        </div>

                        <div class="col-12">
                            <label class="form-label">Deskripsi / Sinopsis</label>
                            <textarea class="form-control" rows="4" th:field="*{deskripsi}" placeholder="Tuliskan deskripsi singkat buku di sini..."></textarea>
                        </div>

                    </div>

                    <div class="mt-5 d-flex gap-3">
                        <button type="submit" class="btn-sage">
                            Simpan Buku
                        </button>
                        <a th:href="@{/buku/view}" class="btn-cancel">
                            Batal
                        </a>
                    </div>

                </form>

            </div>
        </div>

    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
